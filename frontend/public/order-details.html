<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Order Confirmed</title>
  <link rel="stylesheet" href="/css/variables.css">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--font-family);
      background:var(--cream);
      color:var(--gray-800);
    }
    .page{max-width:var(--content-max-width);margin:0 auto;padding:28px 16px 40px}
    .muted{color:var(--gray-500);font-size:13px}
    .tracking-card{background:var(--warm-white);border:1px solid var(--gray-200);border-radius:20px;padding:22px;margin:12px 0;box-shadow:var(--shadow-xs)}
    .tracking-header{display:flex;flex-direction:column;gap:6px}
    .tracking-title{font-size:20px;font-weight:800;color:var(--gray-900)}
    .tracking-id{font-size:14px;color:var(--gray-600);font-weight:700}
    .divider{height:1px;background:var(--gray-200);margin:16px 0}
    .status-block{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .status-badge{display:inline-flex;align-items:center;gap:8px;font-size:15px;font-weight:800;color:var(--gray-900)}
    .status-text{font-size:13px;color:var(--gray-600)}
    .section{margin-top:16px}
    .section-label{font-size:12px;color:var(--gray-500);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px}
    .items-list{display:flex;flex-direction:column;gap:8px}
    .item-line{font-size:14px;color:var(--gray-800);font-weight:600}
    .summary-row{display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:12px;margin-top:14px}
    .summary-item{display:flex;flex-direction:column;gap:4px}
    .summary-label{font-size:12px;color:var(--gray-500);font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
    .summary-value{font-size:15px;font-weight:800;color:var(--gray-900)}
    .progress-steps{display:flex;flex-direction:column;gap:10px}
    .progress-step{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--gray-600)}
    .progress-step .dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--gray-300);background:transparent}
    .progress-step.active{color:var(--gray-900);font-weight:700}
    .progress-step.active .dot{background:#f59e0b;border-color:#f59e0b}
    .progress-step.completed{color:var(--gray-700)}
    .progress-step.completed .dot{background:#10b981;border-color:#10b981}
    .address-text{font-size:13px;color:var(--gray-700);line-height:1.5}
    .card{background:var(--warm-white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:16px;margin:12px 0;box-shadow:var(--shadow-xs)}
    .card-title{font-weight:800;font-size:15px;margin-bottom:10px;color:var(--gray-800)}
    .actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
    .btn{width:100%;height:52px;border-radius:var(--radius);border:1px solid var(--gray-200);background:var(--warm-white);color:var(--gray-800);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;transition:background var(--transition),box-shadow var(--transition)}
    .btn.primary{background:var(--primary);color:#fff;border:none;box-shadow:var(--shadow-sm)}
    .btn.primary:active{background:var(--primary-dark)}
    .btn.ghost:active{background:var(--gray-100)}
    .secondary-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn.ghost{background:var(--warm-white)}
    .rating-content{display:flex;flex-direction:column;gap:14px}
    .rating-item{border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;background:var(--cream)}
    .rating-item-header{display:flex;gap:10px;align-items:center;margin-bottom:10px}
    .rating-img{width:48px;height:48px;border-radius:var(--radius-sm);object-fit:cover;background:var(--gray-100)}
    .rating-item-name{font-weight:700;color:var(--gray-800)}
    .rating-stars{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .star-btn{border:1px solid var(--gray-200);background:var(--warm-white);border-radius:var(--radius-full);padding:6px 12px;font-weight:700;cursor:pointer;transition:background var(--transition-fast),color var(--transition-fast)}
    .star-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .rating-comment{width:100%;min-height:64px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:8px;font-size:13px;font-family:var(--font-family);background:var(--warm-white);color:var(--gray-800);resize:vertical}
    .rating-comment:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(196,93,53,0.12)}
    .rating-message{font-size:13px;color:var(--gray-500)}
    .rating-actions{margin-top:8px}
    .payment-slip-img{width:100%;border-radius:12px;border:1px solid var(--gray-200);display:block;object-fit:cover}
    @media (max-width:520px){
      .summary-row{grid-template-columns:1fr}
      .secondary-actions{grid-template-columns:1fr}
    }
    @media print{
      body{background:#fff}
      .page{padding:0}
      .actions{display:none}
      .card{box-shadow:none}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="tracking-card">
      <div class="tracking-header">
        <div class="tracking-title">Order Tracking</div>
        <div class="tracking-id" id="orderId">Order #BF-—</div>
      </div>
      <div class="divider"></div>
      <div class="status-block">
        <div class="status-badge" id="statusBadge">✅ Confirmed</div>
        <div class="status-text" id="statusText">Your order has been confirmed</div>
      </div>
      <div class="section">
        <div class="section-label">Items</div>
        <div id="itemsList" class="items-list"></div>
      </div>
      <div class="summary-row">
        <div class="summary-item">
          <div class="summary-label">Total</div>
          <div class="summary-value" id="finalTotal">—</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">Type</div>
          <div class="summary-value" id="deliveryMethod">—</div>
        </div>
      </div>
      <div class="section">
        <div class="section-label">Progress</div>
        <div id="progressSteps" class="progress-steps"></div>
      </div>
      <div class="section">
        <div class="section-label">Deliver to</div>
        <div class="address-text" id="deliveryAddress">—</div>
      </div>
    </section>

    <section class="card" id="paymentSlipCard" style="display:none;">
      <div class="card-title">Payment slip</div>
      <img id="paymentSlipImg" class="payment-slip-img" alt="Payment slip" />
    </section>

    <section class="actions">
      <button class="btn primary" id="downloadPdfBtn">Download Invoice (PDF)</button>
      <div class="secondary-actions">
        <a class="btn ghost" id="backHomeBtn" href="/order-form.html">Back to Home</a>
      </div>
    </section>
  </main>

  <script>
    const qs = new URLSearchParams(location.search);
    const orderId = qs.get('order_id') || '—';
    const orderIdDisplay = orderId !== '—' ? `BF-${orderId}` : '—';
    let resolvedUserId = qs.get('user_id') || '';
    try {
      if (!resolvedUserId || resolvedUserId === 'guest') {
        resolvedUserId = localStorage.getItem('bf_psid') || localStorage.getItem('bf_user_id') || '';
      }
    } catch (e) {}
    const tok = qs.get('t') || (() => {
      try { return localStorage.getItem('bf_webview_token') || ''; } catch (e) { return ''; }
    })();
    const returnParams = new URLSearchParams();
    if (resolvedUserId && resolvedUserId !== 'guest') returnParams.set('user_id', resolvedUserId);
    if (tok) returnParams.set('t', tok);
    const returnUrl = '/order-form.html' + (returnParams.toString() ? `?${returnParams.toString()}` : '');
    const userId = resolvedUserId || 'guest';
    document.getElementById('orderId').textContent = orderId !== '—' ? `Order #BF-${orderId}` : 'Order #BF-—';
    document.getElementById('backHomeBtn').setAttribute('href', returnUrl);
    const goBackToOrderForm = () => { window.location.href = returnUrl; };

    const toNumber = (value) => {
      if (typeof value === 'number') return value;
      if (typeof value === 'string') {
        const cleaned = value.replace(/[^0-9.-]/g, '');
        const parsed = Number(cleaned);
        return Number.isFinite(parsed) ? parsed : NaN;
      }
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : NaN;
    };

    const pdfEscape = (value) => String(value ?? '')
      .replace(/[^\x20-\x7E]/g, '?')
      .replace(/\\/g, '\\\\')
      .replace(/\(/g, '\\(')
      .replace(/\)/g, '\\)');

    const buildInvoiceLines = (d) => {
      const money = (v) => {
        const n = toNumber(v);
        return Number.isFinite(n) ? `$${n.toFixed(2)}` : '—';
      };
      const dt = new Date(d.created_at || Date.now());
      const lines = [];
      lines.push('BakeFlow - Invoice');
      lines.push(`Order: BF-${orderId}`);
      lines.push(`Date: ${dt.toLocaleString()}`);
      const deliveryValue = d.delivery_type || (String(d.address || '').toLowerCase().includes('pickup') ? 'Pick Up' : 'Delivery');
      lines.push(`Delivery: ${deliveryValue}`);
      if (d.customer_name) lines.push(`Customer: ${d.customer_name}`);
      if (d.customer_phone) lines.push(`Phone: ${d.customer_phone}`);
      if (d.address) lines.push(`Address: ${d.address}`);
      lines.push('');
      lines.push('Items:');
      (d.items || []).forEach((it) => {
        const name = it.name || it.product || '—';
        const qty = toNumber(it.qty || it.quantity || 0);
        const unit = toNumber(it.price ?? it.unit_price ?? 0);
        const lineTotal = toNumber(it.line_total ?? it.total ?? (Number.isFinite(unit) ? unit * qty : NaN));
        lines.push(`- ${name} x${qty || 0}  ${money(lineTotal)}`);
      });
      lines.push('');
      lines.push(`Subtotal: ${money(d.subtotal)}`);
      if (Number(d.discount) > 0) lines.push(`Discount: -${money(d.discount)}`);
      if (Number(d.delivery_fee ?? d.deliveryFee) > 0) lines.push(`Delivery fee: ${money(d.delivery_fee ?? d.deliveryFee)}`);
      lines.push(`Total: ${money(d.total ?? d.total_amount)}`);
      return lines;
    };

    const buildSimplePdfBytes = (lines) => {
      const encoder = new TextEncoder();
      const parts = [];
      let byteLen = 0;
      const push = (s) => { parts.push(s); byteLen += encoder.encode(s).length; };
      const pad10 = (n) => String(n).padStart(10, '0');

      const lineHeight = 16;
      const left = 50;
      const top = 800;
      const contentLines = [];
      contentLines.push('BT');
      contentLines.push('/F1 12 Tf');
      contentLines.push(`${left} ${top} Td`);
      for (let i = 0; i < lines.length; i++) {
        const text = pdfEscape(lines[i]);
        contentLines.push(`(${text}) Tj`);
        if (i !== lines.length - 1) contentLines.push(`0 -${lineHeight} Td`);
      }
      contentLines.push('ET');
      const contentStream = contentLines.join('\n');
      const contentLen = encoder.encode(contentStream).length;

      const objOffsets = {};
      push('%PDF-1.4\n');

      const addObj = (num, body) => {
        objOffsets[num] = byteLen;
        push(`${num} 0 obj\n${body}\nendobj\n`);
      };

      addObj(1, '<< /Type /Catalog /Pages 2 0 R >>');
      addObj(2, '<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
      addObj(3, '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595.28 841.89] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>');
      addObj(4, '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
      addObj(5, `<< /Length ${contentLen} >>\nstream\n${contentStream}\nendstream`);

      const xrefOffset = byteLen;
      push('xref\n');
      push('0 6\n');
      push('0000000000 65535 f \n');
      for (let i = 1; i <= 5; i++) {
        push(`${pad10(objOffsets[i] || 0)} 00000 n \n`);
      }
      push('trailer\n');
      push('<< /Size 6 /Root 1 0 R >>\n');
      push('startxref\n');
      push(`${xrefOffset}\n`);
      push('%%EOF');

      return encoder.encode(parts.join(''));
    };

    const openPdfBlob = (bytes, filename) => {
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent || '');
      a.href = url;
      a.target = '_blank';
      if (!isIOS) a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    };

    document.getElementById('downloadPdfBtn').addEventListener('click', async () => {
      const data = window.__bfInvoiceData;
      if (!data) {
        alert('Invoice is still loading. Please try again.');
        return;
      }
      const lines = buildInvoiceLines(data);
      const bytes = buildSimplePdfBytes(lines);
      openPdfBlob(bytes, `BakeFlow_Invoice_BF-${orderId}.pdf`);
    });

    // Load order details
    async function loadDetails(){
      let data = null;
      let stored = null;
      // Try localStorage by order ID
      try {
        const storedRaw = localStorage.getItem(`bf_invoice_${orderId}`);
        stored = storedRaw ? JSON.parse(storedRaw) : null;
      } catch (e) {
        stored = null;
      }
      // Fallback: try latest invoice
      if (!stored) {
        try {
          const latestRaw = localStorage.getItem('bf_invoice_latest');
          const latest = latestRaw ? JSON.parse(latestRaw) : null;
          if (latest) stored = latest;
        } catch (e) {}
      }
      if (stored) {
        data = stored;
        // Update order ID display if we got it from stored data
        if (stored.order_id && orderId === '—') {
          document.getElementById('orderId').textContent = 'BF-' + stored.order_id;
        }
      }
      // Try fetching from API
      if (orderId !== '—') {
        try {
          const res = await fetch('/api/orders/' + encodeURIComponent(orderId));
          if (res.ok) data = await res.json();
        } catch(e) { /* ignore */ }
      }
      // Parse items from URL params if provided
      let urlItems = [];
      try {
        const itemsParam = qs.get('items');
        if (itemsParam) urlItems = JSON.parse(itemsParam);
      } catch (e) {}

      const paramNumber = (key) => {
        const raw = qs.get(key);
        if (raw === null || raw === '') return null;
        const num = Number(raw);
        return Number.isFinite(num) ? num : null;
      };
      if (!data || !Array.isArray(data.items) || data.items.length === 0){
        data = {
          created_at: stored?.created_at || new Date().toISOString(),
          customer_name: qs.get('customer_name') || stored?.customer_name || 'Customer',
          customer_phone: qs.get('customer_phone') || stored?.customer_phone || '',
          address: qs.get('address') || stored?.address || 'Pickup at store',
          notes: qs.get('notes') || stored?.notes || '',
          delivery_type: qs.get('delivery_type') || stored?.delivery_type || 'Delivery',
          payment_status: stored?.payment_status || 'Pay on delivery',
          subtotal: stored?.subtotal ?? paramNumber('subtotal'),
          discount: stored?.discount ?? paramNumber('discount'),
          delivery_fee: stored?.delivery_fee ?? paramNumber('delivery_fee'),
          total: stored?.total ?? paramNumber('total') ?? paramNumber('total_amount'),
          promotions: stored?.promotions || [],
          items: stored?.items || urlItems
        };
      } else {
        const subtotalParam = paramNumber('subtotal');
        const discountParam = paramNumber('discount');
        const deliveryFeeParam = paramNumber('delivery_fee');
        const totalParam = paramNumber('total') ?? paramNumber('total_amount');
        if (subtotalParam !== null) data.subtotal = subtotalParam;
        if (discountParam !== null) data.discount = discountParam;
        if (deliveryFeeParam !== null) data.delivery_fee = deliveryFeeParam;
        if (totalParam !== null) data.total = totalParam;
        if (stored?.promotions && !data.promotions) data.promotions = stored.promotions;
      }
      renderDetails(data);
    }

    function renderDetails(d){
      window.__bfInvoiceData = d;
      const slipUrl = d.payment_proof_url || d.proof_url || d.payment_proof || d.paymentSlip || '';
      const formatMoney = (value) => {
        const num = toNumber(value);
        return Number.isFinite(num) ? `$${num.toFixed(2)}` : '—';
      };
      const deliveryValue = d.delivery_type || (String(d.address || '').toLowerCase().includes('pickup') ? 'Pick Up' : 'Delivery');
      const deliveryEl = document.getElementById('deliveryMethod');
      if (deliveryEl) deliveryEl.textContent = deliveryValue;
      const addressEl = document.getElementById('deliveryAddress');
      if (addressEl) addressEl.textContent = d.address || (deliveryValue === 'Pick Up' ? 'Pickup at store' : '—');

      const statusValue = String(d.status || '').trim().toLowerCase();
      const statusMap = {
        pending: { label: 'Pending', emoji: '🟡', text: 'Your order is pending confirmation.' },
        scheduled: { label: 'Scheduled', emoji: '📅', text: 'Your order is scheduled.' },
        confirmed: { label: 'Confirmed', emoji: '✅', text: 'Your order has been confirmed.' },
        preparing: { label: 'Preparing', emoji: '🧁', text: 'We are preparing your order.' },
        ready: { label: 'Ready', emoji: '📦', text: 'Your order is ready for pickup.' },
        delivering: { label: 'Out for delivery', emoji: '🚚', text: 'Your order is on the way.' },
        delivered: { label: 'Delivered', emoji: '📦', text: 'Your order has been delivered.' },
        completed: { label: 'Delivered', emoji: '📦', text: 'Your order has been delivered.' },
        cancelled: { label: 'Cancelled', emoji: '⚪', text: 'This order was cancelled.' },
        canceled: { label: 'Cancelled', emoji: '⚪', text: 'This order was cancelled.' }
      };
      const statusInfo = statusMap[statusValue] || statusMap.confirmed;
      const badgeEl = document.getElementById('statusBadge');
      if (badgeEl) badgeEl.textContent = `${statusInfo.emoji} ${statusInfo.label}`;
      const statusTextEl = document.getElementById('statusText');
      if (statusTextEl) statusTextEl.textContent = statusInfo.text;

      const itemsWrap = document.getElementById('itemsList');
      const rows = (d.items || []).map(it => {
        const qty = toNumber(it.qty || it.quantity || 0);
        const qtyLabel = Number.isFinite(qty) && qty > 0 ? ` × ${qty}` : '';
        const name = it.name || it.product || '—';
        return `<div class="item-line">• ${name}${qtyLabel}</div>`;
      }).join('');
      if (itemsWrap) itemsWrap.innerHTML = rows || '<div class="muted">No items found.</div>';

      const total = toNumber(d.total ?? d.total_amount);
      const totalEl = document.getElementById('finalTotal');
      if (totalEl) totalEl.textContent = formatMoney(total);

      const progressMap = {
        pending: 0,
        scheduled: 0,
        confirmed: 1,
        preparing: 2,
        ready: 3,
        delivering: 3,
        delivered: 4,
        completed: 4
      };
      const isDelivery = String(d.delivery_type || '').toLowerCase() === 'delivery';
      const firstLabel = statusValue === 'scheduled' ? 'Scheduled' : 'Pending';
      const steps = isDelivery ? [
        { key: 'pending', label: firstLabel },
        { key: 'confirmed', label: 'Confirmed' },
        { key: 'preparing', label: 'Preparing' },
        { key: 'delivering', label: 'Out for delivery' },
        { key: 'delivered', label: 'Delivered' }
      ] : [
        { key: 'pending', label: firstLabel },
        { key: 'confirmed', label: 'Confirmed' },
        { key: 'preparing', label: 'Preparing' },
        { key: 'ready', label: 'Ready for pickup' },
        { key: 'delivered', label: 'Picked up' }
      ];
      const currentIndex = Number.isFinite(progressMap[statusValue]) ? progressMap[statusValue] : 0;
      const progressEl = document.getElementById('progressSteps');
      if (progressEl) {
        progressEl.innerHTML = steps.map((step, index) => {
          const state = index < currentIndex ? 'completed' : index === currentIndex ? 'active' : '';
          return `
            <div class="progress-step ${state}">
              <span class="dot"></span>
              <span>${step.label}</span>
            </div>
          `;
        }).join('');
      }

      if (slipUrl) {
        const slipCard = document.getElementById('paymentSlipCard');
        const slipImg = document.getElementById('paymentSlipImg');
        slipImg.src = slipUrl;
        slipCard.style.display = 'block';
      }
    }

    loadDetails();
  </script>
</body>
</html>
