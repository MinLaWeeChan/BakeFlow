<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Order Confirmed</title>
  <link rel="stylesheet" href="/css/variables.css">
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:var(--font-family);
      background:var(--cream);
      color:var(--gray-800);
    }
    .page{max-width:var(--content-max-width);margin:0 auto;padding:28px 16px 40px}
    .confirm-header{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;margin-bottom:24px}
    .success-icon{width:72px;height:72px;border-radius:var(--radius-full);background:var(--success-light);color:var(--success);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:800}
    .confirm-title{font-size:24px;font-weight:800;letter-spacing:-0.01em;color:var(--gray-900)}
    .confirm-text{font-size:14px;color:var(--gray-500)}
    .muted{color:var(--gray-500);font-size:13px}
    .card{background:var(--warm-white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:16px;margin:12px 0;box-shadow:var(--shadow-xs)}
    .card-title{font-weight:800;font-size:15px;margin-bottom:10px;color:var(--gray-800)}
    .summary-grid{display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:12px}
    .summary-item{display:flex;flex-direction:column;gap:4px}
    .summary-label{font-size:12px;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
    .summary-value{font-size:14px;font-weight:700;color:var(--gray-800)}
    .items-header{display:grid;grid-template-columns:1fr 60px 80px 90px;gap:8px;font-size:12px;color:var(--gray-500);text-transform:uppercase;letter-spacing:0.04em;padding:6px 0;border-bottom:1px solid var(--gray-200)}
    .item-row{display:grid;grid-template-columns:1fr 60px 80px 90px;gap:8px;align-items:center;padding:10px 0;border-bottom:1px solid var(--gray-100)}
    .item-row:last-child{border-bottom:none}
    .item-name{font-weight:600;color:var(--gray-800)}
    .item-qty,.item-unit,.item-total{text-align:right;font-weight:700}
    .item-unit{color:var(--gray-500);font-weight:600}
    .promo-rows{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .promo-row{display:flex;justify-content:space-between;gap:8px;font-size:13px;color:var(--success);font-weight:700}
    .totals{display:flex;flex-direction:column;gap:8px}
    .total-row{display:flex;justify-content:space-between;gap:8px;font-size:14px}
    .total-row .label{color:var(--gray-500)}
    .total-row.discount{color:var(--success);font-weight:700}
    .total-row.final{font-size:18px;font-weight:800;color:var(--gray-900)}
    .actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
    .btn{width:100%;height:52px;border-radius:var(--radius);border:1px solid var(--gray-200);background:var(--warm-white);color:var(--gray-800);font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;transition:background var(--transition),box-shadow var(--transition)}
    .btn.primary{background:var(--primary);color:#fff;border:none;box-shadow:var(--shadow-sm)}
    .btn.primary:active{background:var(--primary-dark)}
    .btn.ghost:active{background:var(--gray-100)}
    .secondary-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn.ghost{background:var(--warm-white)}
    .rating-content{display:flex;flex-direction:column;gap:14px}
    .rating-item{border:1px solid var(--gray-200);border-radius:var(--radius);padding:12px;background:var(--cream)}
    .rating-item-header{display:flex;gap:10px;align-items:center;margin-bottom:10px}
    .rating-img{width:48px;height:48px;border-radius:var(--radius-sm);object-fit:cover;background:var(--gray-100)}
    .rating-item-name{font-weight:700;color:var(--gray-800)}
    .rating-stars{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .star-btn{border:1px solid var(--gray-200);background:var(--warm-white);border-radius:var(--radius-full);padding:6px 12px;font-weight:700;cursor:pointer;transition:background var(--transition-fast),color var(--transition-fast)}
    .star-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
    .rating-comment{width:100%;min-height:64px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:8px;font-size:13px;font-family:var(--font-family);background:var(--warm-white);color:var(--gray-800);resize:vertical}
    .rating-comment:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(196,93,53,0.12)}
    .rating-message{font-size:13px;color:var(--gray-500)}
    .rating-actions{margin-top:8px}
    @media (max-width:520px){
      .summary-grid{grid-template-columns:1fr}
      .items-header{display:none}
      .item-row{grid-template-columns:1fr auto;grid-template-areas:"name total" "qty unit";gap:6px}
      .item-name{grid-area:name}
      .item-total{grid-area:total}
      .item-qty{grid-area:qty;text-align:left;font-weight:600}
      .item-unit{grid-area:unit;text-align:right}
      .secondary-actions{grid-template-columns:1fr}
    }
    @media print{
      body{background:#fff}
      .page{padding:0}
      .actions{display:none}
      .card{box-shadow:none}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="confirm-header">
      <div class="success-icon">✓</div>
      <div class="confirm-title">Order Confirmed</div>
      <div class="confirm-text">Thank you! Your order has been placed successfully.</div>
    </section>

    <section class="card">
      <div class="card-title">Order summary</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-label">Order ID</div>
          <div class="summary-value" id="orderId">—</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">Order date</div>
          <div class="summary-value" id="orderDate">—</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">Delivery method</div>
          <div class="summary-value" id="deliveryMethod">—</div>
        </div>
        <div class="summary-item">
          <div class="summary-label">Payment status</div>
          <div class="summary-value" id="paymentStatus">Pay on delivery</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="card-title">Itemized list</div>
      <div class="items-header">
        <div>Item</div>
        <div style="text-align:right;">Qty</div>
        <div style="text-align:right;">Price</div>
        <div style="text-align:right;">Total</div>
      </div>
      <div id="items"></div>
      <div id="promoRows" class="promo-rows"></div>
    </section>

    <section class="card">
      <div class="card-title">Price breakdown</div>
      <div class="totals">
        <div class="total-row">
          <span class="label">Subtotal</span>
          <span id="subtotal">—</span>
        </div>
        <div class="total-row discount" id="discountRow" style="display:none;">
          <span>Discounts</span>
          <span id="discount">—</span>
        </div>
        <div class="total-row" id="deliveryFeeRow" style="display:none;">
          <span class="label">Delivery fee</span>
          <span id="deliveryFee">—</span>
        </div>
        <div class="total-row final">
          <span>Total</span>
          <span id="finalTotal">—</span>
        </div>
      </div>
    </section>

    <section class="card" id="ratingCard" style="display:none;">
      <div class="card-title">Rate your items</div>
      <div class="rating-content" id="ratingContent"></div>
      <div class="rating-actions">
        <button class="btn primary" id="submitRatingBtn" type="button">Submit Ratings</button>
      </div>
    </section>

    <section class="actions">
      <button class="btn primary" id="downloadPdfBtn">Download Invoice (PDF)</button>
      <div class="secondary-actions">
        <a class="btn ghost" id="backHomeBtn" href="/order-form.html">Back to Home</a>
      </div>
    </section>
  </main>

  <script>
    const qs = new URLSearchParams(location.search);
    const orderId = qs.get('order_id') || '—';
    const orderIdDisplay = orderId !== '—' ? `BF-${orderId}` : '—';
    let resolvedUserId = qs.get('user_id') || '';
    try {
      if (!resolvedUserId || resolvedUserId === 'guest') {
        resolvedUserId = localStorage.getItem('bf_psid') || localStorage.getItem('bf_user_id') || '';
      }
    } catch (e) {}
    const tok = qs.get('t') || (() => {
      try { return localStorage.getItem('bf_webview_token') || ''; } catch (e) { return ''; }
    })();
    const returnParams = new URLSearchParams();
    if (resolvedUserId && resolvedUserId !== 'guest') returnParams.set('user_id', resolvedUserId);
    if (tok) returnParams.set('t', tok);
    const returnUrl = '/order-form.html' + (returnParams.toString() ? `?${returnParams.toString()}` : '');
    const userId = resolvedUserId || 'guest';
    document.getElementById('orderId').textContent = orderIdDisplay;
    document.getElementById('backHomeBtn').setAttribute('href', returnUrl);
    const goBackToOrderForm = () => { window.location.href = returnUrl; };

    const pdfEscape = (value) => String(value ?? '')
      .replace(/[^\x20-\x7E]/g, '?')
      .replace(/\\/g, '\\\\')
      .replace(/\(/g, '\\(')
      .replace(/\)/g, '\\)');

    const buildInvoiceLines = (d) => {
      const money = (v) => {
        const n = Number(v);
        return Number.isFinite(n) ? `$${n.toFixed(2)}` : '—';
      };
      const dt = new Date(d.created_at || Date.now());
      const lines = [];
      lines.push('BakeFlow - Invoice');
      lines.push(`Order: BF-${orderId}`);
      lines.push(`Date: ${dt.toLocaleString()}`);
      const deliveryValue = d.delivery_type || (String(d.address || '').toLowerCase().includes('pickup') ? 'Pick Up' : 'Delivery');
      lines.push(`Delivery: ${deliveryValue}`);
      if (d.customer_name) lines.push(`Customer: ${d.customer_name}`);
      if (d.customer_phone) lines.push(`Phone: ${d.customer_phone}`);
      if (d.address) lines.push(`Address: ${d.address}`);
      lines.push('');
      lines.push('Items:');
      (d.items || []).forEach((it) => {
        const name = it.name || it.product || '—';
        const qty = Number(it.qty || it.quantity || 0);
        const unit = Number(it.price ?? it.unit_price ?? 0);
        const lineTotal = Number(it.line_total ?? it.total ?? (Number.isFinite(unit) ? unit * qty : NaN));
        lines.push(`- ${name} x${qty || 0}  ${money(lineTotal)}`);
      });
      lines.push('');
      lines.push(`Subtotal: ${money(d.subtotal)}`);
      if (Number(d.discount) > 0) lines.push(`Discount: -${money(d.discount)}`);
      if (Number(d.delivery_fee ?? d.deliveryFee) > 0) lines.push(`Delivery fee: ${money(d.delivery_fee ?? d.deliveryFee)}`);
      lines.push(`Total: ${money(d.total ?? d.total_amount)}`);
      return lines;
    };

    const buildSimplePdfBytes = (lines) => {
      const encoder = new TextEncoder();
      const parts = [];
      let byteLen = 0;
      const push = (s) => { parts.push(s); byteLen += encoder.encode(s).length; };
      const pad10 = (n) => String(n).padStart(10, '0');

      const lineHeight = 16;
      const left = 50;
      const top = 800;
      const contentLines = [];
      contentLines.push('BT');
      contentLines.push('/F1 12 Tf');
      contentLines.push(`${left} ${top} Td`);
      for (let i = 0; i < lines.length; i++) {
        const text = pdfEscape(lines[i]);
        contentLines.push(`(${text}) Tj`);
        if (i !== lines.length - 1) contentLines.push(`0 -${lineHeight} Td`);
      }
      contentLines.push('ET');
      const contentStream = contentLines.join('\n');
      const contentLen = encoder.encode(contentStream).length;

      const objOffsets = {};
      push('%PDF-1.4\n');

      const addObj = (num, body) => {
        objOffsets[num] = byteLen;
        push(`${num} 0 obj\n${body}\nendobj\n`);
      };

      addObj(1, '<< /Type /Catalog /Pages 2 0 R >>');
      addObj(2, '<< /Type /Pages /Kids [3 0 R] /Count 1 >>');
      addObj(3, '<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595.28 841.89] /Resources << /Font << /F1 4 0 R >> >> /Contents 5 0 R >>');
      addObj(4, '<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
      addObj(5, `<< /Length ${contentLen} >>\nstream\n${contentStream}\nendstream`);

      const xrefOffset = byteLen;
      push('xref\n');
      push('0 6\n');
      push('0000000000 65535 f \n');
      for (let i = 1; i <= 5; i++) {
        push(`${pad10(objOffsets[i] || 0)} 00000 n \n`);
      }
      push('trailer\n');
      push('<< /Size 6 /Root 1 0 R >>\n');
      push('startxref\n');
      push(`${xrefOffset}\n`);
      push('%%EOF');

      return encoder.encode(parts.join(''));
    };

    const openPdfBlob = (bytes, filename) => {
      const blob = new Blob([bytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent || '');
      a.href = url;
      a.target = '_blank';
      if (!isIOS) a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    };

    document.getElementById('downloadPdfBtn').addEventListener('click', async () => {
      const data = window.__bfInvoiceData;
      if (!data) {
        alert('Invoice is still loading. Please try again.');
        return;
      }
      const lines = buildInvoiceLines(data);
      const bytes = buildSimplePdfBytes(lines);
      openPdfBlob(bytes, `BakeFlow_Invoice_BF-${orderId}.pdf`);
    });

    // Load order details
    async function loadDetails(){
      let data = null;
      let stored = null;
      // Try localStorage by order ID
      try {
        const storedRaw = localStorage.getItem(`bf_invoice_${orderId}`);
        stored = storedRaw ? JSON.parse(storedRaw) : null;
      } catch (e) {
        stored = null;
      }
      // Fallback: try latest invoice
      if (!stored) {
        try {
          const latestRaw = localStorage.getItem('bf_invoice_latest');
          const latest = latestRaw ? JSON.parse(latestRaw) : null;
          if (latest) stored = latest;
        } catch (e) {}
      }
      if (stored) {
        data = stored;
        // Update order ID display if we got it from stored data
        if (stored.order_id && orderId === '—') {
          document.getElementById('orderId').textContent = 'BF-' + stored.order_id;
        }
      }
      // Try fetching from API
      if (orderId !== '—') {
        try {
          const res = await fetch('/api/orders/' + encodeURIComponent(orderId));
          if (res.ok) data = await res.json();
        } catch(e) { /* ignore */ }
      }
      // Parse items from URL params if provided
      let urlItems = [];
      try {
        const itemsParam = qs.get('items');
        if (itemsParam) urlItems = JSON.parse(itemsParam);
      } catch (e) {}

      const paramNumber = (key) => {
        const raw = qs.get(key);
        if (raw === null || raw === '') return null;
        const num = Number(raw);
        return Number.isFinite(num) ? num : null;
      };
      if (!data || !Array.isArray(data.items) || data.items.length === 0){
        data = {
          created_at: stored?.created_at || new Date().toISOString(),
          customer_name: qs.get('customer_name') || stored?.customer_name || 'Customer',
          customer_phone: qs.get('customer_phone') || stored?.customer_phone || '',
          address: qs.get('address') || stored?.address || 'Pickup at store',
          notes: qs.get('notes') || stored?.notes || '',
          delivery_type: qs.get('delivery_type') || stored?.delivery_type || 'Delivery',
          payment_status: stored?.payment_status || 'Pay on delivery',
          subtotal: stored?.subtotal ?? paramNumber('subtotal'),
          discount: stored?.discount ?? paramNumber('discount'),
          delivery_fee: stored?.delivery_fee ?? paramNumber('delivery_fee'),
          total: stored?.total ?? paramNumber('total') ?? paramNumber('total_amount'),
          promotions: stored?.promotions || [],
          items: stored?.items || urlItems
        };
      } else {
        const subtotalParam = paramNumber('subtotal');
        const discountParam = paramNumber('discount');
        const deliveryFeeParam = paramNumber('delivery_fee');
        const totalParam = paramNumber('total') ?? paramNumber('total_amount');
        if (subtotalParam !== null) data.subtotal = subtotalParam;
        if (discountParam !== null) data.discount = discountParam;
        if (deliveryFeeParam !== null) data.delivery_fee = deliveryFeeParam;
        if (totalParam !== null) data.total = totalParam;
        if (stored?.promotions && !data.promotions) data.promotions = stored.promotions;
      }
      renderDetails(data);
    }

    function renderDetails(d){
      window.__bfInvoiceData = d;
      const formatMoney = (value) => {
        const num = Number(value);
        return Number.isFinite(num) ? `$${num.toFixed(2)}` : '—';
      };
      const dt = new Date(d.created_at || Date.now());
      document.getElementById('orderDate').textContent = dt.toLocaleString();
      const deliveryValue = d.delivery_type || (String(d.address || '').toLowerCase().includes('pickup') ? 'Pick Up' : 'Delivery');
      document.getElementById('deliveryMethod').textContent = deliveryValue;
      document.getElementById('paymentStatus').textContent = d.payment_status || 'Pay on delivery';
      const itemsWrap = document.getElementById('items');
      const rows = (d.items || []).map(it => {
        const qty = Number(it.qty || it.quantity || 0);
        const unit = Number(it.price ?? it.unit_price ?? 0);
        const lineTotal = Number(it.line_total ?? it.total ?? (Number.isFinite(unit) ? unit * qty : NaN));
        return `
          <div class="item-row">
            <div class="item-name">${it.name || it.product || '—'}</div>
            <div class="item-qty">${qty || '—'}</div>
            <div class="item-unit">${formatMoney(unit)}</div>
            <div class="item-total">${formatMoney(lineTotal)}</div>
          </div>
        `;
      }).join('');
      itemsWrap.innerHTML = rows || '<div class="muted">No items found.</div>';

      const promoRowsEl = document.getElementById('promoRows');
      const promos = Array.isArray(d.promotions) ? d.promotions
        : Array.isArray(d.applied_promotions) ? d.applied_promotions
        : Array.isArray(d.appliedPromotions) ? d.appliedPromotions
        : [];
      promoRowsEl.innerHTML = promos.map(p => {
        const label = typeof p === 'string' ? p : (p.label || p.name || 'Promotion');
        const amount = typeof p === 'object' && p !== null ? p.amount : null;
        return `
          <div class="promo-row">
            <span>${label}</span>
            <span>${amount !== null ? `- ${formatMoney(amount)}` : ''}</span>
          </div>
        `;
      }).join('');

      const subtotal = Number(d.subtotal);
      const discount = Number(d.discount);
      const deliveryFee = Number(d.delivery_fee ?? d.deliveryFee);
      const total = Number(d.total ?? d.total_amount);

      document.getElementById('subtotal').textContent = formatMoney(subtotal);
      if (Number.isFinite(discount) && discount > 0) {
        document.getElementById('discountRow').style.display = 'flex';
        document.getElementById('discount').textContent = `- ${formatMoney(discount)}`;
      }
      if (Number.isFinite(deliveryFee) && deliveryFee > 0) {
        document.getElementById('deliveryFeeRow').style.display = 'flex';
        document.getElementById('deliveryFee').textContent = formatMoney(deliveryFee);
      }
      document.getElementById('finalTotal').textContent = formatMoney(total);
    }

    async function loadRating(){
      const ratingCard = document.getElementById('ratingCard');
      const ratingContent = document.getElementById('ratingContent');
      const submitBtn = document.getElementById('submitRatingBtn');
      if (!orderId || orderId === '—') return;
      const params = new URLSearchParams();
      if (tok) params.set('t', tok);
      if (userId && userId !== 'guest') params.set('user_id', userId);
      if (!params.toString()) return;
      try {
        const res = await fetch(`/api/orders/${encodeURIComponent(orderId)}/rating-status?${params.toString()}`);
        const data = await res.json();
        if (!res.ok) return;
        ratingCard.style.display = 'block';
        if (!data.can_rate) {
          ratingContent.innerHTML = `<div class="rating-message">Ratings open after delivery.</div>`;
          submitBtn.style.display = 'none';
          return;
        }
        const unrated = Array.isArray(data.unrated_items) ? data.unrated_items : [];
        if (unrated.length === 0) {
          ratingContent.innerHTML = `<div class="rating-message">Thanks! You already rated this order.</div>`;
          submitBtn.style.display = 'none';
          return;
        }
        const ratings = {};
        ratingContent.innerHTML = unrated.map(item => {
          ratings[item.product_id] = { stars: 0, comment: '' };
          const price = Number(item.price);
          return `
            <div class="rating-item" data-product-id="${item.product_id}">
              <div class="rating-item-header">
                <img class="rating-img" src="${item.image_url || '/images/placeholder.png'}" alt="">
                <div>
                  <div class="rating-item-name">${item.name || 'Item'}</div>
                  <div class="muted">${Number.isFinite(price) ? `$${price.toFixed(2)}` : ''}</div>
                </div>
              </div>
              <div class="rating-stars" data-product-id="${item.product_id}">
                <button type="button" class="star-btn" data-star="1">⭐ 1</button>
                <button type="button" class="star-btn" data-star="2">⭐ 2</button>
                <button type="button" class="star-btn" data-star="3">⭐ 3</button>
                <button type="button" class="star-btn" data-star="4">⭐ 4</button>
                <button type="button" class="star-btn" data-star="5">⭐ 5</button>
              </div>
              <textarea class="rating-comment" placeholder="Optional comment"></textarea>
            </div>
          `;
        }).join('');
        ratingContent.querySelectorAll('.rating-stars').forEach(group => {
          group.addEventListener('click', (e) => {
            const btn = e.target.closest('.star-btn');
            if (!btn) return;
            const stars = Number(btn.getAttribute('data-star')) || 0;
            const pid = Number(group.getAttribute('data-product-id'));
            if (!ratings[pid]) return;
            ratings[pid].stars = stars;
            group.querySelectorAll('.star-btn').forEach(b => {
              const s = Number(b.getAttribute('data-star')) || 0;
              b.classList.toggle('active', s <= stars);
            });
          });
        });
        ratingContent.querySelectorAll('.rating-item').forEach(itemEl => {
          const pid = Number(itemEl.getAttribute('data-product-id'));
          const textarea = itemEl.querySelector('.rating-comment');
          if (!textarea || !ratings[pid]) return;
          textarea.addEventListener('input', (e) => {
            ratings[pid].comment = e.target.value || '';
          });
        });
        submitBtn.style.display = 'inline-flex';
        submitBtn.onclick = async () => {
          const payloadRatings = Object.keys(ratings).map(key => {
            const pid = Number(key);
            return { product_id: pid, stars: ratings[pid].stars || 0, comment: ratings[pid].comment || '' };
          });
          const missing = payloadRatings.some(r => !r.stars);
          if (missing) {
            alert('Please rate all items before submitting.');
            return;
          }
          submitBtn.disabled = true;
          submitBtn.textContent = 'Submitting...';
          try {
            const res = await fetch(`/api/ratings/bulk?${params.toString()}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ order_id: Number(orderId), ratings: payloadRatings })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Failed to submit ratings');
            ratingContent.innerHTML = `<div class="rating-message">Thanks for your feedback!</div>`;
            submitBtn.style.display = 'none';
          } catch (e) {
            alert(e.message || 'Failed to submit ratings');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit Ratings';
          }
        };
      } catch (e) {}
    }

    loadDetails();
    loadRating();
  </script>
</body>
</html>
